name: Java CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["11"]

    env:
      MAVEN_OPTS: -Djava.awt.headless=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build all modules (install, skip tests)
        shell: bash
        run: |
          set -euo pipefail
          modules=(
            RadarDecoderLibrary
            RidgeCommon
            RidgeHibernate
            RidgeDBWriter
            RidgeImageSaver
            RidgeImageSaverShort
            RidgeLiteImageCreator
            RidgeMonitor
            RidgePurger
            RidgeServer
            TestChart
          )

          for module in "${modules[@]}"; do
            echo "::group::Build $module"
            mvn -B -ntp -f "decoder/$module/pom.xml" clean install -DskipTests
            echo "::endgroup::"
          done

      - name: Run tests for modules that have tests
        shell: bash
        run: |
          set -euo pipefail
          modules=(
            RadarDecoderLibrary
            RidgeCommon
            RidgeHibernate
            RidgeDBWriter
            RidgeImageSaver
            RidgeImageSaverShort
            RidgeLiteImageCreator
            RidgeMonitor
            RidgePurger
            RidgeServer
            TestChart
          )

          for module in "${modules[@]}"; do
            if find "decoder/$module/src/test/java" -type f -name '*.java' 2>/dev/null | grep -q .; then
              echo "::group::Test $module"
              mvn -B -ntp -f "decoder/$module/pom.xml" test
              echo "::endgroup::"
            else
              echo "Skipping tests for $module (no test sources found)"
            fi
          done

