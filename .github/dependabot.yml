# See https://docs.github.com/en/code-security/supply-chain-security/keeping-your-dependencies-updated-automatically/keeping-your-actions-up-to-date-with-dependabot

version: 2
updates:

  - package-ecosystem: "maven"
    directories:
      - "decoder/RadarDecoderLibrary"
      - "decoder/RidgeCommon"
      - "decoder/TestChart"
      - "decoder/RidgeImageSaver"
      - "decoder/RidgeImageSaverShort"
      - "decoder/RidgeLiteImageCreator"
      - "decoder/RidgeServer"
      - "decoder/RidgeHibernate"
      - "decoder/RidgeDBWriter"
      - "decoder/RidgeMonitor"
      - "decoder/RidgePurger"
    schedule:
      interval: "monthly"
    labels:
      - "Bot"
    groups:
      maven:
        patterns:
          - '*'
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "Bot"
    groups:
      github-actions:
        patterns:
          - '*'
